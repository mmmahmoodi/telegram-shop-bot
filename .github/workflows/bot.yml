name: Telegram Bot Runner

on:
  schedule:
    # هر 5 دقیقه اجرا بشه تا ربات همیشه روشن بمونه
    - cron: '*/5 * * * *'
  workflow_dispatch:  # امکان اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # حداکثر 5 ساعت
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: |
          python main.py &
          BOT_PID=$!
          
          # ربات رو برای 5 ساعت نگه دار
          sleep 18000
          
          # بعد از 5 ساعت ربات رو متوقف کن
          kill $BOT_PID || true
